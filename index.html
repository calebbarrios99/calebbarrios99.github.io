<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Página</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      color: #333;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background-color: #2c3e50;
      color: white;
      padding: 1rem 2rem;
    }

    header h1 {
      font-size: 1.8rem;
    }

    nav {
      background-color: #34495e;
      padding: 0.5rem 2rem;
    }

    nav a {
      color: #ecf0f1;
      text-decoration: none;
      margin-right: 1rem;
      font-size: 0.95rem;
    }

    nav a:hover {
      text-decoration: underline;
    }

    main {
      flex: 1;
      padding: 2rem;
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
    }

    main h2 {
      margin-bottom: 1rem;
    }

    main p {
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    footer {
      background-color: #2c3e50;
      color: #aaa;
      text-align: center;
      padding: 1rem;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>Mi Página Web</h1>
  </header>

  <nav>
    <a href="#">Inicio</a>
    <a href="#">Acerca de</a>
    <a href="#">Contacto</a>
  </nav>

  <main>
    <h2>Bienvenido</h2>
    <p>Este es un ejemplo de página HTML genérica con estructura básica.</p>
    <p>Personaliza el contenido según tus necesidades.</p>
  </main>

  <footer>
    <p>&copy; 2026 Mi Página. Todos los derechos reservados.</p>
  </footer>

</body>
</html>
